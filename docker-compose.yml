version: '3'
services:

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ghosttrap-elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    networks:
      - ghosttrap

  kibana:
    image: kibana:8.11.0
    container_name: ghosttrap-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - ghosttrap

  logstash:
    image: logstash:8.11.0
    container_name: ghosttrap-logstash
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch
    networks:
      - ghosttrap

volumes:
  elastic_data:

networks:
  ghosttrap:
    driver: bridge
